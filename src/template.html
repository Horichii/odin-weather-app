<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-App</title>
</head>
<body>

    <h1>Weather App</h1>
    <form action="" id="search-form">
        <input type="text" id="location-input" placeholder="Enter location" required>
        <button type="submit" id="submit-btn">Search</button>
    </form>

    <div id="weather-card">
        <h2 id="display-location">Location</h2>

        <img id="display-icon" src="" alt="Weather Icon">

        <p>Temperature: <span id="display-temp"></span>°F</p>
        <p>Conditions: <span id="display-conditions"></span></p>
        <p>Humidity: <span id="display-humidity"></span>%</p>
    </div>
</body>
</html>
